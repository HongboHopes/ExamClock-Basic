<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监考时钟基础版2.7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: calc(100vw / 192);
        }

        body {
            display: flex;
            align-items: stretch;
            height: 100vh;
            overflow: hidden;
            background-color: #ddd;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #1a1a1a;
        }

        .clock-container {
            text-align: center;
            width: 66.66%;
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            margin-top: -5rem;
        }

        .clock-top {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: -15rem;
        }

        .time {
            font-size: 32rem;
            font-weight: 200;
            letter-spacing: 1.5rem;
            font-variant-numeric: tabular-nums;
            font-family: "Times New Roman", serif;
        }

        .time .seconds {
            font-size: 13rem;
            color: #999;
        }

        .date {
            font-size: 7rem;
            font-weight: 300;
            color: #555;
            margin-top: 6rem;
        }

        .kaofeng {
            margin-top: 7rem;
        }

        .kaofeng img {
            width: 80rem;
            height: auto;
        }

        .exam-over {
            display: none;
            font-size: 14rem;
            font-weight: 400;
            color: #e53935;
        }

        .exam-info {
            width: 36%;
            padding-left: 2rem;
            padding-right: 4rem;
            margin-left: -6rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .exam-info .item {
            font-size: 5.2rem;
            font-weight: 300;
            color: #333;
            margin-bottom: 6rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .exam-info .label {
            color: #555;
            white-space: nowrap;
        }

        .exam-info input,
        .exam-info select {
            font-size: 4.8rem;
            font-weight: 300;
            font-family: inherit;
            border: none;
            border-bottom: 0.25rem solid #999;
            background: transparent;
            color: #1a1a1a;
            outline: none;
            padding: 0.4rem 0;
            width: 100%;
            max-width: 24rem;
            min-width: 0;
        }

        .exam-info input:focus,
        .exam-info select:focus {
            border-bottom-color: #555;
        }

        .exam-info select {
            appearance: none;
            cursor: pointer;
            text-align: center;
            text-align-last: center;
        }

        .exam-info .time-sep {
            font-size: 3rem;
            color: #999;
            flex-shrink: 0;
            margin: 0 0.6rem;
        }

        
        .exam-info .time-digit {
            width: 4.5rem;
            text-align: center;
            text-align-last: center;
            font-size: 5rem;
            font-family: "Times New Roman", serif;
            font-weight: 400;
            border: none;
            border-bottom: 0.25rem solid #999;
            background: transparent;
            color: #1a1a1a;
            outline: none;
            padding: 0.4rem 0;
            appearance: none;
            cursor: pointer;
            max-width: none;
        }

        .exam-info .time-digit:focus {
            border-bottom-color: #555;
        }

        .exam-info .time-colon {
            font-size: 2.6rem;
            color: #333;
            flex-shrink: 0;
            margin: 0 -0.2rem;
        }

        .exam-info .inline-select {
            width: 16rem;
            text-align: center;
            text-align-last: center;
            font-size: 4rem;
            font-weight: 300;
            font-family: inherit;
            border: none;
            border-bottom: 0.25rem solid #999;
            background: transparent;
            color: #1a1a1a;
            outline: none;
            padding: 0.4rem 0;
            appearance: none;
            cursor: pointer;
            max-width: none;
        }

        .exam-info .inline-input {
            width: 12rem;
            text-align: center;
        }

        .exam-info .invigilator-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1;
        }

        .start-btn-wrap {
            padding-left: 0;
        }

        .start-btn {
            font-size: 3.4rem;
            font-weight: 400;
            font-family: inherit;
            color: #fff;
            background: #333;
            border: none;
            border-radius: 0.8rem;
            padding: 1.2rem 4rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .start-btn:hover {
            background: #555;
        }

        
        .fullscreen-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-size: 1.6rem;
            font-family: inherit;
            color: #fff;
            background: #555;
            border: none;
            border-radius: 0.6rem;
            padding: 0.8rem 1.6rem;
            cursor: pointer;
            z-index: 100;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 1.2rem;
            padding: 4rem 5rem;
            text-align: center;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.3);
            max-width: 50rem;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 6rem;
            margin-bottom: 2rem;
        }

        .modal-msg {
            font-size: 2.4rem;
            font-weight: 500;
            color: #333;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .modal-btn {
            font-size: 2rem;
            font-weight: 500;
            font-family: inherit;
            color: #fff;
            background: #e53935;
            border: none;
            border-radius: 0.8rem;
            padding: 1.2rem 5rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-btn:hover {
            background: #c62828;
        }
        
        .copyright {
            position: fixed;
            bottom: 0.8rem;
            left: 1.5rem;
            font-size: 1.2rem;
            color: rgba(0,0,0,0.15);
            z-index: 50;
            user-select: none;
            pointer-events: none;
        }
        
        .volume-control { position: fixed; bottom: 2rem; right: 14rem; display: flex; align-items: center; gap: 0.5rem; z-index: 100; opacity: 0.5; transition: opacity 0.2s; }
        .volume-control:hover { opacity: 1; }
        .volume-control label { font-size: 1.4rem; color: #555; cursor: pointer; }
        .volume-slider { width: 22rem; cursor: pointer; accent-color: #555; }
        .fullscreen-btn:hover {
            opacity: 1;
        }
        .start-btn.started {
            background: #4caf50;
            cursor: default;
        }

        .edit-btn {
            font-size: 3.4rem;
            font-weight: 400;
            font-family: inherit;
            color: #333;
            background: #bbb;
            border: none;
            border-radius: 0.8rem;
            padding: 1.2rem 4rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-left: 2rem;
        }

        .edit-btn:hover {
            background: #ccc;
        }
    
    </style>
</head>

        <script>
        (function() {
        'use strict';

        // 北京时间获取（兼容旧浏览器）
        function getBeijingNow() {
            var now = new Date();
            var beijing;
            try {
                beijing = new Intl.DateTimeFormat('zh-CN', {
                    timeZone: 'Asia/Shanghai',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).format(now);
            } catch (e) {
                // 降级方案：直接用本地时间
                var h = now.getHours().toString().padStart(2, '0');
                var m = now.getMinutes().toString().padStart(2, '0');
                var s = now.getSeconds().toString().padStart(2, '0');
                beijing = h + ':' + m + ':' + s;
            }
            return { now: now, beijing: beijing };
        }

        function getTimeFromDigits(prefix) {
            var el = document.getElementById(prefix + '-h1');
            if (!el) return null;
            var h = parseInt(el.value) * 10 + parseInt(document.getElementById(prefix + '-h2').value);
            var m = parseInt(document.getElementById(prefix + '-m1').value) * 10 + parseInt(document.getElementById(prefix + '-m2').value);
            return { h: h, m: m };
        }

        function parseEndTime() {
            var t = getTimeFromDigits('end');
            if (!t) return null;
            var now = new Date();
            var end = new Date(now);
            end.setHours(t.h, t.m, 0, 0);
            return end;
        }

        var examStarted = false;
        var examOver = false;
        var lastTriggeredEndTime = '';
        var fifteenMinWarned = false;

        function lockInputs(lock) {
            var els = document.querySelectorAll('.exam-info input, .exam-info select, .exam-info .inline-select, .exam-info .time-digit');
            for (var i = 0; i < els.length; i++) {
                els[i].disabled = lock;
            }
        }

        function resetExamInfo() {
            var sel = document.querySelector('.exam-info select');
            if (sel) sel.selectedIndex = 0;
            var startIds = {'start-h1':'0', 'start-h2':'8', 'start-m1':'0', 'start-m2':'0'};
            var endIds = {'end-h1':'1', 'end-h2':'0', 'end-m1':'0', 'end-m2':'0'};
            for (var key in startIds) {
                var el = document.getElementById(key);
                if (el) el.value = startIds[key];
            }
            for (var key in endIds) {
                var el = document.getElementById(key);
                if (el) el.value = endIds[key];
            }
            var inlineSelects = document.querySelectorAll('.inline-select');
            for (var i = 0; i < inlineSelects.length; i++) inlineSelects[i].selectedIndex = 0;
            var invInputs = document.querySelectorAll('.invigilator-group input');
            for (var i = 0; i < invInputs.length; i++) invInputs[i].value = '';
            lastTriggeredEndTime = '10:00';
            examStarted = false;
            var btn = document.getElementById('start-btn');
            if (btn) { btn.textContent = '开始考试'; btn.classList.remove('started'); }
            lockInputs(false);
        }

        function showExamOver() {
            if (examOver) return;
            examOver = true;
            document.getElementById('time').style.display = 'none';
            document.getElementById('date').style.display = 'none';
            var examOverEl = document.getElementById('exam-over');
            if (examOverEl) examOverEl.style.display = 'block';
            var endAudio = document.getElementById('end-audio');
            if (endAudio) if (endAudio) { endAudio.volume = window.globalVolume; endAudio.play().catch(function() {}); }
            setTimeout(function() {
                document.getElementById('time').style.display = '';
                document.getElementById('date').style.display = '';
                if (examOverEl) examOverEl.style.display = 'none';
                document.getElementById('time').style.color = '';
                resetExamInfo();
                examOver = false;
            }, 30000);
        }

        function updateClock() {
            try {
                var bj = getBeijingNow();
                var now = bj.now;
                var beijing = bj.beijing;
                var timeEl = document.getElementById('time');
                if (!timeEl) return;

                var dateStr;
                try {
                    dateStr = new Intl.DateTimeFormat('zh-CN', {
                        timeZone: 'Asia/Shanghai',
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        weekday: 'long'
                    }).format(now);
                } catch (e) {
                    dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 星期' + ['日','一','二','三','四','五','六'][now.getDay()];
                }

                var parts = beijing.split(':');
                timeEl.innerHTML = parts[0] + ':' + parts[1] + '<span class="seconds">:' + parts[2] + '</span>';
                document.getElementById('date').textContent = dateStr;

                if (!examStarted) return;

                var endTime = parseEndTime();
                if (endTime) {
                    var diff = endTime - now;
                    var fifteenMin = 15 * 60 * 1000;
                    var endT = getTimeFromDigits('end');
                    var currentEndStr = endT ? (String(endT.h).padStart(2,'0') + ':' + String(endT.m).padStart(2,'0')) : '';

                    if (diff <= 0) {
                        if (currentEndStr !== lastTriggeredEndTime) {
                            lastTriggeredEndTime = currentEndStr;
                            showExamOver();
                        }
                    } else if (diff <= fifteenMin) {
                        timeEl.style.color = '#e53935';
                        if (!fifteenMinWarned) {
                            fifteenMinWarned = true;
                            var warnAudio = document.getElementById('warn-audio');
                            if (warnAudio) if (warnAudio) { warnAudio.volume = window.globalVolume; warnAudio.play().catch(function() {}); }
                        }
                    } else {
                        timeEl.style.color = '';
                        if (currentEndStr !== lastTriggeredEndTime) {
                            lastTriggeredEndTime = '';
                        }
                    }
                }
            } catch (e) {
                // 静默处理错误，保证时钟持续运行
            }
        }

        // DOM 加载完成后再绑定事件和启动时钟
        function init() {
            var startBtn = document.getElementById('start-btn');
            if (startBtn) {
                startBtn.addEventListener('click', function() {
                    if (examStarted) return;
                    
                    // 验证考试时间区间
                    var now = new Date();
                    var nowH = now.getHours();
                    var nowM = now.getMinutes();
                    var nowTotal = nowH * 60 + nowM;
                    
                    var startTime = getTimeFromDigits('start');
                    var endTime = getTimeFromDigits('end');
                    
                    if (startTime && endTime) {
                            var startTotal = startTime.h * 60 + startTime.m;
                            var endTotal = endTime.h * 60 + endTime.m;
                            
                            var startMinus5 = startTotal - 5;
                            if (nowTotal < startMinus5 || nowTotal >= endTotal) {
                                document.getElementById('modal-msg').innerHTML = '不在考试时间范围内！<br><br><small>请在考试开始前5分钟至考试结束期间点击</small>';
                                document.getElementById('modal-overlay').classList.add('show');
                                return;
                            }
                    }
                    
                    examStarted = true;
                    fifteenMinWarned = false;
                    startBtn.textContent = '考试中...';
                    startBtn.classList.add('started');
                    lastTriggeredEndTime = '';
                    lockInputs(true);
                });
            }

            var editBtn = document.getElementById('edit-btn');
            if (editBtn) {
                editBtn.addEventListener('click', function() {
                    if (!examStarted) return;
                    examStarted = false;
                    fifteenMinWarned = false;
                    var sBtn = document.getElementById('start-btn');
                    if (sBtn) { sBtn.textContent = '开始考试'; sBtn.classList.remove('started'); }
                    document.getElementById('time').style.color = '';
                    lastTriggeredEndTime = '';
                    lockInputs(false);
                });
            }

            updateClock();
            setInterval(updateClock, 1000);
            // 全局音量控制
            window.globalVolume = 0.5;
            window.setVol = function(val) {
                var vol = val / 100;
                window.globalVolume = vol;
                var warnA = document.getElementById('warn-audio');
                var endA = document.getElementById('end-audio');
                if (warnA) warnA.volume = vol;
                if (endA) endA.volume = vol;
                var label = document.querySelector('.volume-control label');
                if (label) {
                    if (vol === 0) label.textContent = '🔇';
                    else if (vol < 0.3) label.textContent = '🔈';
                    else if (vol < 0.7) label.textContent = '🔉';
                    else label.textContent = '🔊';
                }
            };
            window.setVol(80);

            // 弹窗关闭
            var modalOk = document.getElementById('modal-ok');
            var modalOverlay = document.getElementById('modal-overlay');
            if (modalOk) {
                modalOk.addEventListener('click', function() {
                    modalOverlay.classList.remove('show');
                });
            }
            if (modalOverlay) {
                modalOverlay.addEventListener('click', function(e) {
                    if (e.target === modalOverlay) modalOverlay.classList.remove('show');
                });
            }

            // 全屏按钮
            var fsBtn = document.getElementById('fullscreen-btn');
            if (fsBtn) {
                fsBtn.addEventListener('click', function() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(function() {});
                        fsBtn.textContent = '⛶ 退出全屏';
                    } else {
                        document.exitFullscreen();
                        fsBtn.textContent = '⛶ 全屏';
                    }
                });
                document.addEventListener('fullscreenchange', function() {
                    if (!document.fullscreenElement) {
                        fsBtn.textContent = '⛶ 全屏';
                    }
                });
            }

        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        })();
    </script>
        <div class="volume-control" id="volume-control">
        <label for="volume-slider">🔊</label>
        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" oninput="window.setVol(this.value)">
    </div>
    <button class="fullscreen-btn" id="fullscreen-btn" title="全屏显示">⛶ 全屏</button>

    <div class="modal-overlay" id="modal-overlay">
